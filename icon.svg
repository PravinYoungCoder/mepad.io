<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="50%" style="stop-color:#ff9500"/>
      <stop offset="100%" style="stop-color:#ffdd00"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="128" x2="512" y2="128" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="#ffffff08" stroke-width="1"/>
  <line x1="128" y1="0" x2="128" y2="512" stroke="#ffffff08" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#ffffff08" stroke-width="1"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="#ffffff08" stroke-width="1"/>
  <!-- Tablet outline -->
  <rect x="120" y="60" width="272" height="380" rx="24" fill="none" stroke="url(#accent)" stroke-width="12"/>
  <!-- Screen -->
  <rect x="140" y="90" width="232" height="310" rx="8" fill="#ffffff08"/>
  <!-- Home button line -->
  <rect x="216" y="420" width="80" height="8" rx="4" fill="url(#accent)"/>
  <!-- Flame on screen -->
  <path d="M256 320 C230 300 220 270 235 245 C240 260 248 265 248 265 C240 240 250 210 270 195 C265 215 272 228 272 228 C278 205 292 190 295 170 C310 190 318 220 308 250 C315 240 318 230 316 218 C330 238 335 268 320 290 C325 282 326 272 322 264 C335 280 335 305 320 320 C305 335 275 340 256 320Z" fill="url(#flame)"/>
  <!-- ME text -->
  <text x="256" y="165" font-family="Georgia, serif" font-size="36" font-weight="bold" text-anchor="middle" fill="url(#accent)">Me</text>
</svg>
